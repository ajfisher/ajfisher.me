<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
<title id="title">Completion score by elapsed time</title>
<desc id="desc">Completion over five minutes using score equals 1 minus 1 minus r to the n. SOTA improves 65 percent once per minute. Fast 15 percent and Fast 30 percent improve every six seconds. A subtle pass zone begins at 95 percent completion.</desc>
<defs>
  <radialGradient id="slide-bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#3f3f3f"/>
    <stop offset="100%" stop-color="#262626"/>
  </radialGradient>
  <marker id="turn-sota" markerWidth="8" markerHeight="8" refX="4" refY="4" markerUnits="userSpaceOnUse">
    <path d="M2 2 L6 6 M6 2 L2 6" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  </marker>
  <marker id="turn-fast-30" markerWidth="8" markerHeight="8" refX="4" refY="4" markerUnits="userSpaceOnUse">
    <path d="M2 2 L6 6 M6 2 L2 6" stroke="#ff825e" stroke-width="1.6" stroke-linecap="round"/>
  </marker>
  <marker id="turn-fast-15" markerWidth="8" markerHeight="8" refX="4" refY="4" markerUnits="userSpaceOnUse">
    <path d="M2 2 L6 6 M6 2 L2 6" stroke="#ffbfd7" stroke-width="1.6" stroke-linecap="round"/>
  </marker>
</defs>
<style>
  .axis { font: 400 22px Rokkitt, Georgia, serif; fill: #ffffff; }
  .tick { font: 400 18px Rokkitt, Georgia, serif; fill: #d8d8d8; }
  .legend { font: 400 21px Rokkitt, Georgia, serif; fill: #ffffff; }
  .callout { font: 400 21px Rokkitt, Georgia, serif; }
  .series { fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
  .sota { stroke: #ffffff; }
  .fast30 { stroke: #ff825e; }
  .fast15 { stroke: #ffbfd7; }
  .sotaText { fill: #ffffff; }
  .fast30Text { fill: #ffcebf; }
  .fast15Text { fill: #ffbfd7; }
</style>

<rect width="1280" height="720" fill="url(#slide-bg)"/>
<rect x="96" y="58" width="1088" height="28.5" fill="#bfffdd" opacity="0.09"/>

<g stroke="#ffffff" stroke-width="1" opacity="0.16">
  <line x1="96" y1="628" x2="1184" y2="628"/>
  <line x1="96" y1="485.5" x2="1184" y2="485.5"/>
  <line x1="96" y1="343" x2="1184" y2="343"/>
  <line x1="96" y1="200.5" x2="1184" y2="200.5"/>
  <line x1="96" y1="86.5" x2="1184" y2="86.5"/>
  <line x1="96" y1="58" x2="1184" y2="58"/>
  <line x1="96" y1="58" x2="96" y2="628"/>
  <line x1="313.6" y1="58" x2="313.6" y2="628"/>
  <line x1="531.2" y1="58" x2="531.2" y2="628"/>
  <line x1="748.8" y1="58" x2="748.8" y2="628"/>
  <line x1="966.4" y1="58" x2="966.4" y2="628"/>
  <line x1="1184" y1="58" x2="1184" y2="628"/>
</g>

<line x1="96" y1="628" x2="1184" y2="628" stroke="#ffffff" stroke-width="2" opacity="0.28"/>
<line x1="96" y1="58" x2="96" y2="628" stroke="#ffffff" stroke-width="2" opacity="0.28"/>

<g class="tick">
  <text x="80" y="634" text-anchor="end">0%</text>
  <text x="80" y="491.5" text-anchor="end">25%</text>
  <text x="80" y="349" text-anchor="end">50%</text>
  <text x="80" y="206.5" text-anchor="end">75%</text>
  <text x="80" y="92.5" text-anchor="end">95%</text>
  <text x="80" y="64" text-anchor="end">100%</text>
  <text x="96" y="660" text-anchor="middle">0m</text>
  <text x="313.6" y="660" text-anchor="middle">1m</text>
  <text x="531.2" y="660" text-anchor="middle">2m</text>
  <text x="748.8" y="660" text-anchor="middle">3m</text>
  <text x="966.4" y="660" text-anchor="middle">4m</text>
  <text x="1184" y="660" text-anchor="middle">5m</text>
</g>

<text class="axis" x="640" y="693" text-anchor="middle">elapsed time</text>
<text class="axis" transform="translate(30 343) rotate(-90)" text-anchor="middle">completion score</text>

<polyline class="series sota" marker-mid="url(#turn-sota)" marker-end="url(#turn-sota)" points="96,628 313.6,257.5 531.2,127.8 748.8,82.4 966.4,66.6 1184,61"/>
