<polyline class="series fast30" marker-mid="url(#turn-fast-30)" marker-end="url(#turn-fast-30)" points="96,628 117.8,457 139.5,337.3 161.3,253.5 183,194.9 204.8,153.8 226.6,125.1 248.3,104.9 270.1,90.9 291.8,81 313.6,74.1 335.4,69.3 357.1,65.9 378.9,63.5 400.6,61.9 422.4,60.7 444.2,59.9 465.9,59.3 487.7,58.9 509.4,58.6 531.2,58.5 553,58.3 574.7,58.2 596.5,58.2 618.2,58.1 640,58.1 661.8,58.1 683.5,58 705.3,58 727,58 748.8,58 770.6,58 792.3,58 814.1,58 835.8,58 857.6,58 879.4,58 901.1,58 922.9,58 944.6,58 966.4,58 988.2,58 1009.9,58 1031.7,58 1053.4,58 1075.2,58 1097,58 1118.7,58 1140.5,58 1162.2,58 1184,58"/>

<g opacity="0.52" stroke-width="1.5" stroke-dasharray="5 7">
  <line x1="291.8" y1="86.5" x2="291.8" y2="628" stroke="#ff825e"/>
  <line x1="509.4" y1="86.5" x2="509.4" y2="628" stroke="#ffbfd7"/>
  <line x1="748.8" y1="86.5" x2="748.8" y2="628" stroke="#ffffff"/>
</g>

<circle cx="291.8" cy="81" r="6.5" fill="#ff825e" stroke="#3f3f3f" stroke-width="2.5"/>
<circle cx="509.4" cy="84" r="6.5" fill="#ffbfd7" stroke="#3f3f3f" stroke-width="2.5"/>
<circle cx="748.8" cy="82.4" r="6.5" fill="#ffffff" stroke="#3f3f3f" stroke-width="2.5"/>

<text class="callout fast30Text" x="218" y="112" text-anchor="end">n=9 / 54s</text>
<text class="callout fast15Text" x="494" y="145" text-anchor="end">n=19 / 114s</text>
<text class="callout sotaText" x="764" y="178">n=3 / 3m</text>

<g class="legend" transform="translate(790 548)">
  <line x1="0" y1="0" x2="56" y2="0" class="series sota"/>
  <circle cx="28" cy="0" r="3" fill="#ffffff"/>
  <text x="76" y="7">SOTA</text>
  <line x1="0" y1="34" x2="56" y2="34" class="series fast30"/>
  <circle cx="28" cy="34" r="3" fill="#ff825e"/>
  <text x="76" y="41">Fast 30%</text>
  <line x1="0" y1="68" x2="56" y2="68" class="series fast15"/>
  <circle cx="28" cy="68" r="3" fill="#ffbfd7"/>
  <text x="76" y="75">Fast 15%</text>
</g>
</svg>
